name: MLOps CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  train-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run MLflow experiment
        run: python mlflow_experiment.py

      - name: Start API (background)
        run: |
          uvicorn api:app --host 0.0.0.0 --port 8000 &
          sleep 3

      - name: Test API health
        run: |
          curl -sf http://localhost:8000/health

      - name: Test cost prediction
        run: |
          curl -sf -X POST http://localhost:8000/predict/cost \
            -H "Content-Type: application/json" \
            -d '{
              "defect_type": "Cosmetic",
              "defect_location": "Surface",
              "severity": "Minor",
              "inspection_method": "Visual Inspection",
              "defect_count": 2,
              "temperature": 25.0,
              "product_id": 101,
              "month": 5,
              "quarter": 2,
              "day_of_week": 1,
              "product_avg_cost": 150.0,
              "product_defect_count": 3
            }'

      - name: Test severity prediction
        run: |
          curl -sf -X POST http://localhost:8000/predict/severity \
            -H "Content-Type: application/json" \
            -d '{
              "defect_type": "Structural",
              "defect_location": "Internal",
              "severity": "Critical",
              "inspection_method": "Automated Testing",
              "defect_count": 5,
              "temperature": 30.0,
              "product_id": 202,
              "month": 5,
              "quarter": 2,
              "day_of_week": 3,
              "product_avg_cost": 200.0,
              "product_defect_count": 10
            }'

  docker-build:
    runs-on: ubuntu-latest
    needs: train-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: defects-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
