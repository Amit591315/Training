name: Llama2 MLOps CI

on:
  push:
    branches: [llama2-*]
  pull_request:
    branches: [llama2-*]
  workflow_dispatch:

jobs:
  llama2-finetune-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements-llama2.txt
          pip install pytest pandas

      - name: Install Ollama (Linux)
        run: |
          curl -fsSL https://ollama.ai/install.sh | sh
          ollama --version

      - name: Start Ollama service
        run: |
          # Start Ollama in background
          ollama serve &
          sleep 10
          # Pull llama2 model
          ollama pull llama2
          sleep 5

      - name: Fine-tune Llama2 models
        run: |
          python finetune_llama2.py
        timeout-minutes: 30

      - name: Start Llama2 API
        run: |
          python -m uvicorn llama2_api:app --host 0.0.0.0 --port 8001 &
          sleep 5

      - name: Test API health
        run: |
          curl -sf http://localhost:8001/health

      - name: Test severity prediction
        run: |
          curl -sf -X POST http://localhost:8001/predict/severity \
            -H "Content-Type: application/json" \
            -d '{
              "defect_type": "Structural",
              "defect_location": "Internal",
              "inspection_method": "Automated Testing",
              "product_id": 42
            }'

      - name: Test cost prediction
        run: |
          curl -sf -X POST http://localhost:8001/predict/cost \
            -H "Content-Type: application/json" \
            -d '{
              "defect_type": "Functional",
              "defect_location": "Component",
              "inspection_method": "Manual Testing",
              "product_id": 99,
              "severity": "Critical"
            }'

      - name: Run batch inference
        run: |
          python llama2_mlflow_inference.py
        timeout-minutes: 15

      - name: Upload inference results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: llama2-inference-results
          path: llama2_batch_predictions.csv

  llama2-docker-build:
    runs-on: ubuntu-latest
    needs: llama2-finetune-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Llama2 API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.llama2
          push: false
          tags: defects-llama2-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate docker-compose
        run: |
          docker compose -f docker-compose-llama2.yml config

      - name: Build docker-compose images
        run: |
          docker compose -f docker-compose-llama2.yml build --no-cache
        timeout-minutes: 30
