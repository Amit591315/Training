services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: defects-api
    ports:
      - "8000:8000"
    restart: unless-stopped

  mlflow:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: defects-mlflow
    command: mlflow ui --backend-store-uri sqlite:///mlflow.db --host 0.0.0.0 --port 5000
    ports:
      - "5000:5000"
    volumes:
      - ./mlflow.db:/app/mlflow.db
      - ./mlruns:/app/mlruns
    restart: unless-stopped
